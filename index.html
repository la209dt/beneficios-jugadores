<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escáner de Jugadores</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

#reader{
width:300px;
margin:auto;
}

#resultado{
margin-top:30px;
font-size:20px;
}
</style>
</head>

<body>

<h2>Escanear QR del jugador</h2>

<div id="reader"></div>

<div id="resultado">
Esperando escaneo...
</div>

<script>

const sheetURL = "PEGA_AQUI_TU_LINK_CSV";

let jugadores = [];

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const filas = data.split("\n").slice(1);

jugadores = filas.map(f => {
const c = f.split(",");
return {
id:c[0],
nombre:c[1],
equipo:c[2],
beneficio:c[3]
};
});

});

function buscarJugador(id){

const j = jugadores.find(x => x.id == id);

if(j){

document.getElementById("resultado").innerHTML = `
<h3>${j.nombre}</h3>
<p>Equipo: ${j.equipo}</p>
<p>Beneficio: ${j.beneficio}</p>
`;

}else{

document.getElementById("resultado").innerHTML = "Jugador no encontrado";

}

}

function onScanSuccess(decodedText){

buscarJugador(decodedText);

}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

if(devices.length){

html5QrCode.start(
devices[0].id,
{ fps: 10, qrbox: 250 },
onScanSuccess
);

}

});

</script>

</body>
</html>
