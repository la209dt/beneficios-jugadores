<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Validación Jugador</title>
<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}
.card{
border:1px solid #ccc;
padding:30px;
width:300px;
margin:auto;
border-radius:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>Validación de Jugador</h2>
<div id="resultado"></div>
</div>

<script>

const jugadores = {
"92833":{
nombre:"Juan Perez",
club:"Tigre FC",
activo:true
},
"12345":{
nombre:"Lucas Diaz",
club:"River FC",
activo:true
}
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(jugadores[id]){
document.getElementById("resultado").innerHTML = `
<h3>${jugadores[id].nombre}</h3>
<p>Club: ${jugadores[id].club}</p>
<p style="color:green;font-weight:bold;">Jugador habilitado</p>
<p>Beneficio: 20% descuento</p>
`;
}else{
document.getElementById("resultado").innerHTML = `
<p style="color:red;font-weight:bold;">Jugador no válido</p>
`;
}

</script>

</body>
</html>
