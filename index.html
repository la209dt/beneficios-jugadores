<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beneficios Jugadores</title>
<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
background:#f2f2f2;
}

.card{
background:white;
padding:30px;
border-radius:10px;
display:inline-block;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
color:#222;
}

.activo{
color:green;
font-weight:bold;
}

.inactivo{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Beneficios Jugadores</h1>

<div id="resultado">Buscando jugador...</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_IHlpIJR0ugREiUrJUlEUTcG93_EVYU9OSIvVVgBLy0MdrZj1X5Jer6larEULR6bLsAQtuZqyZ0RM/pub?output=csv";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const filas = data.split("\n").slice(1);

let jugador = null;

filas.forEach(fila=>{
const col = fila.split(",");

if(col[5] == id){
jugador = col;
}
});

if(jugador){

let estadoClase = jugador[6].trim()=="Activo" ? "activo":"inactivo";

document.getElementById("resultado").innerHTML = `
<div class="card">
<h2>${jugador[1]}</h2>
<p><b>DNI:</b> ${jugador[2]}</p>
<p><b>Club:</b> ${jugador[3]}</p>
<p><b>Categoria:</b> ${jugador[4]}</p>
<p class="${estadoClase}">${jugador[6]}</p>
</div>
`;

}else{

document.getElementById("resultado").innerHTML =
"<h2>Jugador no encontrado</h2>";

}

});

</script>

</body>
</html>
