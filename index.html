<!DOCTYPE html>
<html>
<body>

<h1>Beneficios Jugadores</h1>

<div id="resultado"></div>

</body>
</script>
<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/1j7MPov5JzbsGiB82DhMZRiPeq1gWaskuzL1smx0ig18/export?format=csv";

function obtenerParametro(nombre) {
  const url = new URL(window.location.href);
  return url.searchParams.get(nombre);
}

const jugadorID = obtenerParametro("id");

fetch(sheetURL)
  .then(response => response.text())
  .then(data => {

    const filas = data.split("\n");

    filas.forEach((fila, index) => {

      if(index === 0) return; // salta encabezado

      const columnas = fila.split(",");

      const nombre = columnas[1];
      const dni = columnas[2];
      const club = columnas[3];
      const categoria = columnas[4];
      const ficha = columnas[5];
      const estado = columnas[6];

      if(ficha == jugadorID){

        if(estado.trim() === "Activo"){

          document.getElementById("resultado").innerHTML = `
          <h2>${nombre}</h2>
          <p>DNI: ${dni}</p>
          <p>Club: ${club}</p>
          <p>Categoría: ${categoria}</p>
          <p style="color:green;font-weight:bold;">Jugador habilitado</p>
          `;

        } else {

          document.getElementById("resultado").innerHTML = `
          <h2>${nombre}</h2>
          <p style="color:red;font-weight:bold;">Jugador NO habilitado</p>
          `;

        }

      }

    });

  });

</script>
</body>
</html>
