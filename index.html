<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beneficios Jugadores</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:50px;
}

.card{
border:1px solid #ccc;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.activo{
color:green;
font-weight:bold;
}

.inactivo{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Beneficio de Jugadores</h2>

<div id="resultado">
Buscando jugador...
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTU_LINK_REAL/pub?output=csv";

function getParametro(nombre){
const params = new URLSearchParams(window.location.search);
return params.get(nombre);
}

const id = getParametro("id");

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const filas = data.split("\n").slice(1);
let encontrado = false;

filas.forEach(f => {

const col = f.split(",");

const ficha = col[5]; // columna F

if(ficha == id){

const estado = col[6];

document.getElementById("resultado").innerHTML = `
<div class="card">
<h3>${col[1]}</h3>
<p><b>DNI:</b> ${col[2]}</p>
<p><b>Club:</b> ${col[3]}</p>
<p><b>Categoria:</b> ${col[4]}</p>
<p class="${estado == "Activo" ? "activo" : "inactivo"}">
${estado}
</p>
</div>
`;

encontrado = true;

}

});

if(!encontrado){
document.getElementById("resultado").innerHTML = "Jugador no encontrado";
}

});

</script>

</body>
</html>
