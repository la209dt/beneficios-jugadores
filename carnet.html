<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnet LIFUBA</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#e9eef3;
padding:20px;
}

h2{
margin-bottom:5px;
}

input{
padding:10px;
font-size:18px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 18px;
font-size:15px;
margin:5px;
cursor:pointer;
border:none;
border-radius:6px;
background:#1d4ed8;
color:white;
}

button:hover{
background:#1e40af;
}

video{
width:280px;
border-radius:10px;
margin-top:10px;
}

.paso{
font-weight:bold;
margin-top:20px;
}

#credencial{

width:340px;
height:540px;
background:white;
border-radius:16px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
overflow:hidden;
}

.header{
background:#0f172a;
color:white;
padding:15px;
}

.header h3{
margin:0;
font-size:20px;
}

.subtitulo{
font-size:13px;
opacity:0.9;
}

.contenido{
padding:15px;
}

.foto{

width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #ddd;
margin-top:10px;

}

.nombre{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.dato{
font-size:15px;
margin-top:3px;
}

.qr{
margin-top:15px;
}

.footer{

background:#f3f4f6;
font-size:12px;
padding:8px;
margin-top:10px;

}

</style>
</head>

<body>

<h2>Carnet Jugador LIFUBA</h2>

<div class="paso">Paso 1: Escribe tu DNI y genera el carnet</div>

<input id="dni" placeholder="Ingresa tu DNI">
<button onclick="buscarJugador()">Generar</button>

<br>

<div class="paso">Paso 2: Activar cámara</div>

<button onclick="activarCamara()">Activar cámara</button>

<br>

<video id="video" autoplay></video>

<br>

<div class="paso">Paso 3: Tomar foto</div>

<button onclick="capturar()">Tomar foto</button>

<canvas id="canvas" style="display:none"></canvas>

<br>

<div class="paso">Paso 4: Descargar carnet</div>

<button onclick="descargarCarnet()">Descargar carnet</button>

<br><br>

<div id="credencial">

<div class="header">

<h3>LIGA DE FUTBOL BARILOCHE</h3>
<div class="subtitulo">CARNET OFICIAL DE JUGADOR</div>

</div>

<div class="contenido">

<img id="foto" class="foto">

<div class="nombre" id="nombre">Nombre jugador</div>

<div class="dato" id="club"></div>
<div class="dato" id="categoria"></div>

<div class="qr">
<img id="qr">
</div>

</div>

<div class="footer">

Carnet digital • LIFUBA

</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR_IHlpIJR0ugREiUrJUlEUTcG93_EVYU9OSIvVVgBLy0MdrZj1X5Jer6larEULR6bLsAQtuZqyZ0RM/pub?output=csv";

let jugadorActual=null;

async function buscarJugador(){

const dni=document.getElementById("dni").value;

const res=await fetch(sheetURL);
const data=await res.text();

const filas=data.split("\n").slice(1);

for(let fila of filas){

const col=fila.split(",");

if(col[2]==dni){

jugadorActual={
nombre:col[1],
club:col[3],
categoria:col[4],
ficha:col[5]
};

document.getElementById("nombre").innerText=jugadorActual.nombre;
document.getElementById("club").innerText="Club: "+jugadorActual.club;
document.getElementById("categoria").innerText="Categoría: "+jugadorActual.categoria;

const qrURL="https://la209dt.github.io/beneficios-jugadores/?id="+jugadorActual.ficha;

document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data="+qrURL;

return;

}

}

alert("Jugador no encontrado");

}

function activarCamara(){

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{

document.getElementById("video").srcObject=stream;

});

}

function capturar(){

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const size=Math.min(video.videoWidth,video.videoHeight);

canvas.width=size;
canvas.height=size;

ctx.drawImage(
video,
(video.videoWidth-size)/2,
(video.videoHeight-size)/2,
size,
size,
0,
0,
size,
size
);

const foto=canvas.toDataURL("image/png");

document.getElementById("foto").src=foto;

}

function descargarCarnet(){

const nombre=document.getElementById("nombre").innerText.replace(/\s+/g,"_");

html2canvas(document.getElementById("credencial"),{
useCORS:true,
allowTaint:true
}).then(canvas=>{

const link=document.createElement("a");

link.download="Carnet_LIFUBA_"+nombre+".png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>

</body>
</html>
